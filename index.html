<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid DAG Task Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="brand">
                <img src="logo-uin.png" alt="Logo UIN" style="width: 45px; height: auto;">
                <h2>Hybrid DAG</h2>
            </div>

            <button id="btnBukaModalTambah" class="btn-primary" style="margin-top: 30px;">
                + Add New Task
            </button>

            <div style="flex-grow: 1;"></div>

            <div class="bottom-nav">
                <a href="#" class="nav-link">ℹ️ About Project</a>
                <div id="areaAuth" class="auth-card">
                    <button id="btnLogin" class="btn-login">Masuk dengan Google</button>
                    
                    <div id="userInfo" class="user-info" style="display: none;">
                        <img id="userFoto" src="" alt="Foto Profil" class="avatar">
                        <div class="user-details">
                            <span id="userName" class="user-name"></span>
                            <span id="userEmail" class="user-email" style="font-size: 11px; color: #666;"></span>
                        </div>
                        <button id="btnLogout" class="btn-logout" title="Keluar">⎋</button>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-header" style="display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1 id="teksSapaan">Selamat Datang,</h1>
                    <p id="teksTanggalWaktu" class="subtitle">Memuat waktu...</p>
                </div>
                
                <div id="btnBukaKalender" class="calendar-widget">
                    <div class="calendar-icon">📅</div>
                    <div>
                        <span class="calendar-label">Kalender Akademik</span>
                        <span id="teksKalenderMini" class="calendar-value">Buka Jadwal</span>
                    </div>
                </div>
            </header>

            <div class="toolbar">
                <input type="text" id="inputSearch" class="search-bar" placeholder="🔍 Cari tugas...">
                <select id="inputSort" class="sort-select">
                    <option value="urgensiTinggi">🔥 Prioritas Tertinggi</option>
                    <option value="urgensiRendah">🧊 Prioritas Terendah</option>
                    <option value="abjadAZ">🔤 Abjad A - Z</option>
                    <option value="abjadZA">🔤 Abjad Z - A</option>
                </select>
            </div>

            <div id="wadahDaftarTugas" class="task-grid">
                </div>
        </main>
    </div>

    <div id="modalOverlay" class="overlay" style="display: none;"></div>

    <div id="modalTugas" class="modal-card" style="display: none;">
        <div class="modal-header">
            <h3 id="modalTitle">Detail Tugas</h3>
            <div class="modal-actions">
                <div class="dropdown">
                    <button id="btnTitikTiga" class="btn-icon">⋮</button>
                    <div id="dropdownMenu" class="dropdown-content">
                        <a href="#" id="menuEdit">✏️ Edit Tugas</a>
                        <a href="#" id="menuReminder">⏰ Add Reminder</a>
                        <a href="#" id="menuHapus" style="color: #dc3545;">🗑️ Hapus Tugas</a>
                    </div>
                </div>
                <button id="btnTutupModal" class="btn-icon">✕</button>
            </div>
        </div>

        <div class="modal-body">
            <div id="modeBaca" style="display: block;">
                <h2 id="bacaNamaTugas" style="margin-top: 0;">Nama Tugas</h2>
                <p class="subtitle">Tenggat: <span id="bacaTenggat"></span></p>
                <div class="sub-task-container">
                    <h4>Sub-tugas:</h4>
                    <div id="wadahBacaSubTugas">
                        </div>
                </div>
            </div>

            <div id="modeEdit" style="display: none;">
                <div class="form-group">
                    <label>Nama Tugas:</label>
                    <input type="text" id="inputNamaTugas" class="form-control" placeholder="Contoh: Makalah Alpro">
                </div>
                <div class="form-group">
                    <label>Daftar Sub-Tugas:</label>
                    <div id="wadahSubTugas" style="display: flex; flex-direction: column; gap: 8px;">
                        </div>
                    <button type="button" id="btnTambahSub" class="btn-secondary">+ Tambah Sub-Tugas</button>
                </div>
                <div class="form-group">
                    <label>Tenggat Waktu:</label>
                    <input type="datetime-local" id="inputTenggat" class="form-control">
                </div>
                <button id="tombolSimpanTugas" class="btn-primary" style="width: 100%; margin-top: 15px;">Simpan Tugas</button>
            </div>
        </div>
    </div>

    <div id="modalReminder" class="modal-card mini-modal" style="display: none; z-index: 1010;">
        <div class="modal-header">
            <h3>Atur Pengingat</h3>
            <button id="btnTutupReminder" class="btn-icon">✕</button>
        </div>
        <div class="modal-body">
            <select id="opsiReminder" class="form-control" style="margin-bottom: 10px;">
                <option value="none">Jangan ingatkan saya</option>
                <option value="1h">1 Jam Sebelum Tenggat</option>
                <option value="3h">3 Jam Sebelum Tenggat</option>
                <option value="6h">6 Jam Sebelum Tenggat</option>
                <option value="12h">12 Jam Sebelum Tenggat</option>
                <option value="1d">1 Hari Sebelum Tenggat</option>
                <option value="manual">Tentukan Waktu Manual...</option>
            </select>
            <input type="datetime-local" id="editManualReminder" class="form-control" style="display: none; margin-bottom: 15px;">
            <button id="btnSimpanReminder" class="btn-primary" style="width: 100%;">Setel Alarm</button>
        </div>
    </div>

    <script type="module" src="firebase-config.js"></script>
    <script type="module" src="SistemWeb.js"></script>
</body>
</html>
